<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Obsidian</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect trick.
      // Converts the 404 URL into a query string so index.html can restore it.
      // Source: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // Keep 1 path segment (the repo name: /obsidian)

      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
